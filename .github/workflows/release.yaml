name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare release metadata
        id: meta
        run: |
          version="${GITHUB_REF_NAME#v}"
          image_repository="ghcr.io/${GITHUB_REPOSITORY,,}"
          dockerhub_image_repository="docker.io/hjames/oci-cas-issuer"
          chart_repository="oci://ghcr.io/${GITHUB_REPOSITORY_OWNER,,}"
          dockerhub_chart_repository="oci://registry-1.docker.io/hjames"

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "image_repository=${image_repository}" >> "${GITHUB_OUTPUT}"
          echo "dockerhub_image_repository=${dockerhub_image_repository}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${version}-controller" >> "${GITHUB_OUTPUT}"
          echo "chart_repository=${chart_repository}" >> "${GITHUB_OUTPUT}"
          echo "dockerhub_chart_repository=${dockerhub_chart_repository}" >> "${GITHUB_OUTPUT}"

      - name: Verify release version
        run: |
          test "$(cat VERSION)" = "${{ steps.meta.outputs.version }}"
          grep -q "^version: ${{ steps.meta.outputs.version }}$" charts/oci-cas-issuer/Chart.yaml
          grep -q "^appVersion: ${{ steps.meta.outputs.version }}$" charts/oci-cas-issuer/Chart.yaml

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - run: go test ./...

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ steps.meta.outputs.image_repository }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.dockerhub_image_repository }}:${{ steps.meta.outputs.image_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - uses: azure/setup-helm@v4

      - run: helm lint charts/oci-cas-issuer

      - name: Package Helm chart
        run: |
          sed -i "s|repository: .*|repository: ${{ steps.meta.outputs.image_repository }}|" charts/oci-cas-issuer/values.yaml
          sed -i "s|tag: .*|tag: ${{ steps.meta.outputs.image_tag }}|" charts/oci-cas-issuer/values.yaml
          mkdir -p dist/charts
          helm package charts/oci-cas-issuer \
            --destination dist/charts \
            --version "${{ steps.meta.outputs.version }}" \
            --app-version "${{ steps.meta.outputs.version }}"
          sha256sum "dist/charts/oci-cas-issuer-${{ steps.meta.outputs.version }}.tgz" > "dist/charts/oci-cas-issuer-${{ steps.meta.outputs.version }}.tgz.sha256"

      - name: Push Helm chart
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "${GITHUB_TOKEN}" | helm registry login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin
          echo "${DOCKERHUB_TOKEN}" | helm registry login registry-1.docker.io --username "${DOCKERHUB_USERNAME}" --password-stdin
          helm push "dist/charts/oci-cas-issuer-${{ steps.meta.outputs.version }}.tgz" "${{ steps.meta.outputs.chart_repository }}"
          helm push "dist/charts/oci-cas-issuer-${{ steps.meta.outputs.version }}.tgz" "${{ steps.meta.outputs.dockerhub_chart_repository }}"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "dist/charts/oci-cas-issuer-${{ steps.meta.outputs.version }}.tgz" \
            "dist/charts/oci-cas-issuer-${{ steps.meta.outputs.version }}.tgz.sha256" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag
